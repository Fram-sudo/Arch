# ==========================================
#        CONFIGURATION STARSHIP
# ==========================================

add_newline = false

format = """
$directory$git_branch
$character"""

# --- Configuration des modules ---

[directory]
# Utilisation de ton Jaune (Couleur or/cuivre) pour les dossiers
style = "bold #C29629"
format = "[  $path]($style) "
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
# L'icône et le nom de la branche Git (apparaît uniquement dans les dossiers GitHub)
# Utilisation de ton Cyan (Bleu canard/Gris) pour un beau contraste
symbol = " "
style = "italic #5A9494"
format = "[$symbol$branch]($style) "

[character]
# La petite flèche de commande. Rouge bordeaux si succès, rouge vif si erreur.
success_symbol = "[❯](bold #A32335)"
error_symbol = "[✗](bold #C2293F)"
